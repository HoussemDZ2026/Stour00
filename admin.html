<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم حسام DZ | الإدارة</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="admin-header">
        <h1 id="display-store-name" class="store-title">متجر حسام DZ</h1>
        <div class="header-actions">
            <button class="btn-icon" onclick="copyStoreLink()"><i class="fas fa-copy"></i> نسخ الرابط</button>
            <button class="btn-icon" onclick="showInstallPrompt()"><i class="fas fa-download"></i> تنزيل التطبيق</button>
        </div>
    </header>

    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <p>الزوار</p>
                <div class="counts">
                    <span>يوم: <b id="v-day">0</b></span>
                    <span>أسبوع: <b id="v-week">0</b></span>
                    <span>شهر: <b id="v-month">0</b></span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-shopping-bag"></i>
                <p>المبيعات</p>
                <div class="counts">
                    <span>يوم: <b id="s-day">0</b></span>
                    <span>أسبوع: <b id="s-week">0</b></span>
                    <span>شهر: <b id="s-month">0</b></span>
                </div>
            </div>
        </div>
        <button class="btn-reset" onclick="resetStatsManual()"><i class="fas fa-redo"></i> تصفير الإحصائيات يدوياً</button>
    </section>

    <nav class="admin-nav">
        <button class="main-btn" onclick="openAddModal()"><i class="fas fa-plus-circle"></i> إضافة منتج جديد</button>
        <button class="main-btn btn-orders" onclick="toggleOrders()"><i class="fas fa-truck"></i> الطلبيات الواردة <span id="order-badge" class="badge" style="display:none;">0</span></button>
        <button class="main-btn btn-products" onclick="toggleProductsList()"><i class="fas fa-boxes"></i> المنتجات الحالية</button>
        <button class="main-btn btn-settings" onclick="openSettings()"><i class="fas fa-cog"></i> إعدادات المتجر</button>
    </nav>

    <div id="orders-container" class="data-section" style="display:none;">
        <h2 class="section-title">قائمة الطلبات</h2>
        <div id="orders-list"></div>
    </div>

    <div id="admin-products-container" class="data-section" style="display:none;">
        <h2 class="section-title">إدارة المنتجات</h2>
        <div id="admin-products-list"></div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3>إضافة منتج جديد</h3>
            <input type="text" id="p-name" placeholder="اسم المنتج" class="admin-input">
            <textarea id="p-desc" placeholder="مواصفات المنتج" class="admin-input"></textarea>
            <input type="number" id="p-price" placeholder="سعر المنتج (دج)" class="admin-input">
            <input type="number" id="p-old-price" placeholder="السعر قبل التخفيض (اختياري)" class="admin-input">
            
            <div class="option-row">
                <label>تفعيل عداد تشويق؟</label>
                <input type="checkbox" id="p-timer" onchange="toggleTimerInputs()">
            </div>

            <div id="timer-inputs-container" style="display:none; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px dashed #cbd5e1;">
                <p style="font-size: 0.8rem; margin-bottom: 8px; color: #64748b;">حدد مدة العداد التنازلي:</p>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; display: block;">ساعات:</label>
                        <input type="number" id="p-hours" class="admin-input" value="0" min="0" style="margin:0">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.7rem; display: block;">دقائق:</label>
                        <input type="number" id="p-minutes" class="admin-input" value="30" min="0" max="59" style="margin:0">
                    </div>
                </div>
            </div>

            <div class="upload-area" onclick="document.getElementById('p-image').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>اضغط لرفع صورة المنتج</p>
                <input type="file" id="p-image" hidden accept="image/*">
                <img id="image-preview" style="display:none; width: 100px; margin-top: 10px;">
            </div>

            <div class="modal-actions">
                <button onclick="saveProduct()" class="btn-save">تأكيد الرفع</button>
                <button onclick="closeModal('add-modal')" class="btn-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>إعدادات المتجر</h3>
            <label>اسم المتجر الجديد:</label>
            <input type="text" id="new-store-name" class="admin-input" placeholder="اكتب الاسم هنا">
            <div class="modal-actions">
                <button onclick="updateStoreName()" class="btn-save">حفظ التغيير</button>
                <button onclick="closeModal('settings-modal')" class="btn-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        function toggleTimerInputs() {
            const container = document.getElementById('timer-inputs-container');
            container.style.display = document.getElementById('p-timer').checked ? 'block' : 'none';
        }
    </script>
    <script src="admin-logic.js"></script>
</body>
        </html>
