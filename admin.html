<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة المتجر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4af37; /* ذهبي */
            --bg-dark: #0f0f0f; /* أسود ملكي */
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
        }

        /* اسم المتجر الاحترافي */
        .store-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(45deg, var(--bg-dark), #2c2c2c);
            border-bottom: 2px solid var(--primary-color);
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .store-header h1 {
            font-size: 2.5em;
            background: linear-gradient(to right, #d4af37, #fcf6ba, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* زر نسخ الرابط الجذاب */
        .copy-link-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .btn-copy {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-copy:hover {
            background-color: var(--primary-color);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--primary-color);
        }

        /* قسم التقارير والزوار */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-top: 4px solid var(--primary-color);
        }

        .stat-card h3 { color: var(--primary-color); margin-bottom: 10px; }
        .stat-value { font-size: 1.8em; font-weight: bold; }

        .btn-reset {
            margin-top: 10px;
            font-size: 0.8em;
            color: #ff4d4d;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* أزرار العمليات الكبيرة */
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .main-btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .btn-add { background-color: var(--success); color: white; }
        .btn-orders { background-color: #007bff; color: white; }

        .main-btn:active { transform: scale(0.95); }

        /* النوافذ المنبثقة (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--primary-color);
        }

        /* التصميم المتجاوب للهاتف */
        @media (max-width: 600px) {
            .store-header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

    <div class="store-header">
        <h1 id="storeName">اسم متجرك الاحترافي</h1>
    </div>

    <div class="copy-link-section">
        <button class="btn-copy" onclick="copyStoreLink()">
            <i class="fas fa-copy"></i> نسخ رابط المتجر
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>زوار اليوم</h3>
            <div class="stat-value" id="dailyVisitors">0</div>
            <button class="btn-reset" onclick="resetStat('dailyVisitors')">تصفير</button>
        </div>
        <div class="stat-card">
            <h3>مبيعات الأسبوع</h3>
            <div class="stat-value" id="weeklySales">0</div>
            <button class="btn-reset" onclick="resetStat('weeklySales')">تصفير</button>
        </div>
        </div>

    <div class="action-btns">
        <button class="main-btn btn-add" onclick="showAddProductModal()">
            <i class="fas fa-plus"></i> إضافة منتج جديد
        </button>
        <button class="main-btn btn-orders">
            <i class="fas fa-shopping-cart"></i> الطلبيات الواردة
        </button>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-color);">إضافة منتج جديد</h2>
            <input type="text" placeholder="اسم المنتج" style="width:100%; margin-bottom:15px; padding:10px;">
            <textarea placeholder="وصف المنتج" style="width:100%; margin-bottom:15px; padding:10px;"></textarea>
            <input type="number" placeholder="السعر" style="width:100%; margin-bottom:15px; padding:10px;">
            <div style="display:flex; justify-content: space-between;">
                <button class="main-btn btn-add" onclick="saveProduct()">تأكيد</button>
                <button class="main-btn" style="background:#666;" onclick="hideModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        function copyStoreLink() {
            // وظيفة النسخ مع النافذة الجذابة
            alert("✨ تم نسخ رابط متجرك بنجاح!");
        }

        function showAddProductModal() {
            document.getElementById('addProductModal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('addProductModal').style.display = 'none';
        }

        function resetStat(id) {
            if(confirm("هل أنت متأكد من تصفير العداد؟")) {
                document.getElementById(id).innerText = '0';
            }
        }
    </script>
</body>
              </html>
