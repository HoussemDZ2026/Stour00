<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الملكية | Stour00</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #fcf6ba;
            --bg-black: #0a0a0a;
            --card-bg: #161616;
            --text-white: #ffffff;
            --success: #28a745;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0; padding: 15px;
        }

        /* اسم المتجر بطريقة إحترافية */
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid var(--gold);
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(to right, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* زر نسخ الرابط المثير */
        .copy-section { text-align: center; margin-bottom: 30px; }
        .btn-copy {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }
        .btn-copy:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* تقارير الزوار والمبيعات */
        .stats-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;
        }
        .stat-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border-bottom: 3px solid var(--gold);
            text-align: center;
        }
        .stat-box h3 { font-size: 0.9em; color: var(--gold); margin: 0 0 10px 0; }
        .stat-value { font-size: 1.5em; font-weight: bold; }
        .btn-reset-small {
            background: none; border: none; color: var(--danger); font-size: 0.7em; cursor: pointer; margin-top: 10px;
        }

        /* الأزرار الرئيسية */
        .main-actions { display: flex; flex-direction: column; gap: 15px; }
        .btn-main {
            padding: 18px; border: none; border-radius: 15px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .add-btn { background: var(--success); color: white; }
        .order-btn { background: #0066ff; color: white; }
        .app-btn { background: var(--gold); color: black; }

        /* النوافذ المنبثقة الجذابة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box {
            background: var(--card-bg); width: 90%; max-width: 500px;
            padding: 25px; border-radius: 25px; border: 1px solid var(--gold);
            max-height: 90vh; overflow-y: auto;
        }
        
        .input-group { margin-bottom: 15px; }
        .input-style {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #222; color: white; outline: none; box-sizing: border-box;
        }
        .input-style:focus { border-color: var(--gold); }

        .upload-area {
            border: 2px dashed #444; padding: 20px; border-radius: 15px;
            text-align: center; color: #888; cursor: pointer; margin-bottom: 20px;
        }

        /* إشعارات النجاح */
        .success-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 15px 30px;
            border-radius: 50px; display: none; z-index: 10000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div id="successToast" class="success-toast">تمت العملية بنجاح ✨</div>

    <div class="header">
        <h1 id="displayStoreName">متجر حسام DZ</h1>
    </div>

    <div class="copy-section">
        <button class="btn-copy" onclick="copyLink()">
            <i class="fas fa-link"></i> نسخ رابط المتجر
        </button>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <h3>زوار اليوم</h3>
            <div class="stat-value" id="v-day">0</div>
            <button class="btn-reset-small" onclick="resetStat('v-day')">تصفير</button>
        </div>
        <div class="stat-box">
            <h3>المبيعات</h3>
            <div class="stat-value" id="s-day">0</div>
            <button class="btn-reset-small" onclick="resetStat('s-day')">تصفير</button>
        </div>
    </div>

    <div class="main-actions">
        <button class="btn-main add-btn" onclick="openModal('addModal')">
            <i class="fas fa-plus-circle"></i> إضافة منتج جديد
        </button>
        <button class="btn-main order-btn" onclick="openModal('ordersModal')">
            <i class="fas fa-list-ul"></i> الطلبيات الواردة
        </button>
        <button class="btn-main app-btn" onclick="askInstall()">
            <i class="fas fa-mobile-alt"></i> تثبيت التطبيق على الهاتف
        </button>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:var(--gold); text-align:center;">إضافة منتج</h2>
            <div class="input-group"><input type="text" id="p-name" placeholder="اسم المنتج" class="input-style"></div>
            <div class="input-group"><textarea id="p-desc" placeholder="وصف المنتج" class="input-style" rows="3"></textarea></div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="p-price" placeholder="السعر" class="input-style">
                <input type="number" id="p-old-price" placeholder="السعر القديم" class="input-style">
            </div>
            <div class="input-group"><input type="number" id="p-timer" placeholder="ساعات العرض (تشويق)" class="input-style"></div>
            
            <div class="upload-area" onclick="document.getElementById('f-input').click()">
                <i class="fas fa-image" style="font-size:2em;"></i>
                <p id="f-name">ارفع صورة المنتج</p>
                <input type="file" id="f-input" hidden onchange="document.getElementById('f-name').innerText='✅ تم اختيار الصورة'">
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn-main add-btn" style="flex:1" onclick="actionSuccess('تم إضافة المنتج بنجاح')">تأكيد</button>
                <button class="btn-main" style="flex:1; background:#444; color:white;" onclick="closeModal('addModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="ordersModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:var(--gold); text-align:center;">الطلبيات الواردة</h2>
            <p style="text-align:center; color:#888;">لا توجد طلبيات جديدة حالياً</p>
            <button class="btn-main" style="width:100%; background:#444; color:white;" onclick="closeModal('ordersModal')">إغلاق</button>
        </div>
    </div>

    <div id="installModal" class="modal-overlay">
        <div class="modal-box" style="text-align:center;">
            <i class="fas fa-download" style="font-size:3em; color:var(--gold);"></i>
            <h3>تثبيت التطبيق</h3>
            <p>هل أنت متأكد من تنزيل التطبيق على هاتفك؟</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main add-btn" style="flex:1" onclick="actionSuccess('بدأ التحميل...')">نعم</button>
                <button class="btn-main" style="flex:1; background:#444; color:white;" onclick="closeModal('installModal')">لا</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            actionSuccess("تم نسخ رابط متجرك بنجاح 📋");
        }

        function actionSuccess(msg) {
            const toast = document.getElementById('successToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { 
                toast.style.display = 'none'; 
                closeModal('addModal');
                closeModal('installModal');
            }, 2000);
        }

        function resetStat(id) {
            if(confirm("هل تريد تصفير هذا العداد؟")) {
                document.getElementById(id).innerText = "0";
            }
        }

        function askInstall() { openModal('installModal'); }
    </script>
</body>
    </html>
