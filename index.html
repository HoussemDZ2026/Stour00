<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #d4af37; --dark: #121212; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; color: var(--dark); }
        header { background: var(--dark); color: var(--primary); padding: 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .product-card { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .product-img { width: 100%; height: auto; }
        .product-info { padding: 20px; }
        .price { color: #28a745; font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        
        /* استمارة الطلب الاحترافية */
        .order-form { background: #eee; padding: 20px; border-top: 2px solid var(--primary); }
        .order-form h3 { margin-top: 0; color: var(--dark); border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--dark); color: var(--primary); border: 2px solid var(--primary); padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .submit-btn:hover { background: var(--primary); color: var(--dark); }
    </style>
</head>
<body>

    <header>
        <h1>متجر حُسام DZ</h1>
    </header>

    <div class="container">
        <div class="product-card">
            <img src="https://via.placeholder.com/500x400?text=صورة+المنتج" class="product-img">
            <div class="product-info">
                <h2>اسم المنتج هنا</h2>
                <div class="price">4,500 دج</div>
                <p>وصف مختصر للمنتج ومميزاته الجذابة للزبون.</p>
            </div>

            <div class="order-form">
                <h3><i class="fas fa-shopping-basket"></i> لطلب المنتج يرجى ملء البيانات:</h3>
                <input type="text" placeholder="الاسم واللقب" class="input-field">
                <input type="tel" placeholder="رقم الهاتف" class="input-field">
                <select class="input-field">
                    <option value="">اختر الولاية</option>
                    <option value="1">أدرار</option>
                    <option value="2">الشلف</option>
                    </select>
                <button class="submit-btn" onclick="alert('تم إرسال طلبك بنجاح! سنتصل بك قريباً')">
                    تأكيد الشراء الآن
                </button>
            </div>
        </div>
    </div>

</body>
</html>
