<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجرنا الاحترافي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1 id="store-name" class="animated-title">متجر حسام DZ</h1>
        <div class="welcome-msg-container">
            <p id="welcome-message" class="moving-text">أهلاً بكم في متجرنا.. جودة عالمية وأسعار تنافسية!</p>
        </div>
    </header>

    <main id="products-container">
        <div id="no-products" class="no-products-msg" style="display: none;">
            <i class="fas fa-box-open"></i>
            <p>الوقت الحالي لا يوجد منتجات للبيع</p>
        </div>
        
        <div id="products-list"></div>
    </main>

    <div id="order-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-product-name" class="modal-title">اسم المنتج</h2>
            <hr>
            <div class="form-group">
                <label>الاسم واللقب:</label>
                <input type="text" id="customer-name" placeholder="أدخل اسمك الكامل">
            </div>
            <div class="form-group">
                <label>رقم الهاتف:</label>
                <input type="tel" id="customer-phone" placeholder="أدخل رقم هاتفك">
            </div>
            <div class="form-group">
                <label>الولاية والبلدية:</label>
                <input type="text" id="customer-address" placeholder="مثال: الجزائر - الدار البيضاء">
            </div>
            <div class="form-group">
                <label>الكمية المطلوبة:</label>
                <input type="number" id="order-quantity" value="1" min="1">
            </div>
            
            <div class="modal-buttons">
                <button id="confirm-btn" class="btn-confirm">تأكيد الطلب</button>
                <button id="cancel-btn" class="btn-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="success-screen" class="success-overlay" style="display: none;">
        <div class="success-card">
            <div class="check-icon">✓</div>
            <h2>تم استلام طلبك بنجاح!</h2>
            <p>سوف نتواصل معك في الهاتف عن قريب</p>
            <button onclick="location.reload()" class="btn-back">العودة إلى المتجر</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
